<svg width="100%" height="100%" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0a2a5e"/>
    </linearGradient>

    <!-- Blue glow gradient -->
    <linearGradient id="waveGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <!-- Wave Lines -->

  <path
    d="M -100 850 C 200 750 350 950 800 800"
    stroke="url(#waveGradient)"
    stroke-width="6"
    fill="none"
    filter="url(#glow)"
    opacity="0.8"
  />

  <path
    d="M -100 880 C 250 780 400 1000 850 830"
    stroke="url(#waveGradient)"
    stroke-width="4"
    fill="none"
    filter="url(#glow)"
    opacity="0.6"
  />

  <path
    d="M -100 910 C 250 810 420 1020 900 860"
    stroke="url(#waveGradient)"
    stroke-width="3"
    fill="none"
    filter="url(#glow)"
    opacity="0.5"
  />

  <path
    d="M -100 940 C 300 840 450 1040 900 890"
    stroke="url(#waveGradient)"
    stroke-width="2"
    fill="none"
    filter="url(#glow)"
    opacity="0.4"
  />

</svg>